<div id="intro">

  🥹 To remind you that I love you 🥰<br>

  </h1>

  <small>P.S. Music will begin when you press play (just a heads up incase you're in class) </small>
</div>

<!-- 🎵 AUDIO -->
<audio id="musicPlayer" loop></audio>

<!-- 🌌 MAIN APP -->
<div id="app">
    <div id="memoryLayer"></div>
    <div id="edgeLayer"></div>

  <!-- 🕰 CLOCK -->
<canvas id="clockCanvas" width="200" height="200"></canvas>

    <div id="hours"></div>

  <div id="poemLeft"></div>
<div id="poemRight"></div>


  <!-- 💕 MILESTONES -->
  <div id="milestones"></div>

  <!-- 📸 FLOATING MEMORIES -->

  <div id="particles"></div>

</div>

<footer>
  Made by Your Nonsense❤
